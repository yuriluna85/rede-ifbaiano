<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar IF Baiano — DICOM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --verde:    #009639;
            --verde-dk: #007a2e;
            --verde-lt: #e6f5ec;
            --vermelho: #C8102E;
            --preto:    #0d0d0d;
            --cinza-1:  #f0f0ee;
            --cinza-2:  #e2e2e2;
            --cinza-3:  #aaaaaa;
            --branco:   #ffffff;
            --txt:      #1a1a1a;
            --txt-sec:  #666666;
            --radius:   16px;
            --shadow:   0 4px 24px rgba(0,0,0,.08);
            --shadow-h: 0 12px 40px rgba(0,0,0,.16);
            --dur:      .35s;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── FUNDO ANTI-BURN-IN ────────────────────────────────────
           Canvas com bolhas de gradiente se movendo lentamente.
           Velocidade imperceptível ao olho, mas mantém os pixels
           em constante mudança — protege telas OLED/plasma/LCD.
        ─────────────────────────────────────────────────────────── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #eef0ee;
        }

        header, .top-bar, #status-console, .main-content, footer {
            position: relative;
            z-index: 10;
        }

        /* ── HEADER ────────────────────────────────────────────── */
        header {
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 5px solid var(--verde);
            box-shadow: 0 2px 20px rgba(0,0,0,.06);
            padding: 0 32px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 20px;
            min-height: 88px;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .logo-if { height: 60px; width: auto; display: block; }
        .header-brand h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem; font-weight: 800;
            color: var(--preto); letter-spacing: -.5px; line-height: 1.1;
        }
        .header-brand span {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: .75rem; font-weight: 500;
            color: var(--verde); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 3px;
        }
        .header-clock { text-align: right; }
        #clock {
            font-family: 'Syne', sans-serif;
            font-size: 2rem; font-weight: 700;
            color: var(--preto); line-height: 1; letter-spacing: -1px;
        }
        #date-top {
            font-size: .72rem; font-weight: 700;
            color: var(--verde); text-transform: uppercase;
            letter-spacing: 1.5px; margin-top: 2px;
        }

        /* ── BARRA DE PROGRESSO ────────────────────────────────── */
        .top-bar { height: 3px; background: var(--cinza-2); overflow: hidden; }
        #bar-fill { height: 100%; background: var(--verde); transition: width 1s linear; }

        /* ── CONSOLE ───────────────────────────────────────────── */
        #status-console {
            font-family: 'DM Sans', monospace;
            font-size: .78rem; color: var(--verde);
            background: rgba(13,26,18,.9);
            backdrop-filter: blur(8px);
            padding: 7px 16px;
            display: flex; align-items: center; gap: 8px;
        }
        #status-console::before {
            content: '●'; font-size: .6rem;
            animation: blink 1.4s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

        /* ── LAYOUT ────────────────────────────────────────────── */
        .main-content {
            padding: 24px 20px 110px;
            flex: 1; max-width: 1600px; margin: 0 auto; width: 100%;
        }

        /* ── FILTROS ───────────────────────────────────────────── */
        .filters-wrap {
            display: flex; flex-wrap: wrap;
            gap: 6px; margin-bottom: 24px; align-items: center;
        }
        .filters-label {
            font-size: .72rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--cinza-3); margin-right: 4px;
        }
        .btn-filter {
            background: rgba(255,255,255,.85);
            border: 1.5px solid var(--cinza-2);
            color: var(--txt-sec);
            padding: 6px 14px; border-radius: 999px;
            cursor: pointer; font-size: .8rem; font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            transition: background var(--dur), color var(--dur), border-color var(--dur), transform .15s;
            white-space: nowrap; backdrop-filter: blur(6px);
        }
        .btn-filter:hover  { border-color: var(--verde); color: var(--verde); transform: translateY(-1px); }
        .btn-filter.active { background: var(--verde); color: var(--branco); border-color: var(--verde); }

        /* ── SKELETON ──────────────────────────────────────────── */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px,1fr));
            gap: 18px;
        }
        .skeleton-card {
            background: rgba(255,255,255,.5);
            border-radius: var(--radius); height: 180px;
            overflow: hidden; position: relative;
        }
        .skeleton-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg,transparent 0%,rgba(255,255,255,.6) 50%,transparent 100%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

        /* ── NEWS GRID ─────────────────────────────────────────── */
        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
        }

        /* ── CARD ──────────────────────────────────────────────── */
        .card {
            display: flex; flex-direction: column;
            background: rgba(255,255,255,.93);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius); overflow: hidden;
            text-decoration: none; color: inherit;
            box-shadow: var(--shadow);
            transition: box-shadow var(--dur), transform var(--dur);
            position: relative;
            animation: fadeUp .5s ease both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .card:hover { box-shadow: var(--shadow-h); transform: translateY(-4px); }

        .card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}
        .card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
        .card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}
        .card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}
        .card:nth-child(n+9){animation-delay:.36s}

        .card.featured {
            grid-column: 1 / -1; flex-direction: row; max-height: 280px;
        }
        .card.featured::before {
            content: ''; position: absolute;
            left:0; top:0; bottom:0; width:5px; background: var(--verde);
        }

        /* ── IMAGEM COM KEN BURNS ──────────────────────────────────
           Animação de pan + zoom lento em loop (28–34s por ciclo).
           Mantém a imagem em movimento constante sem parecer um
           slideshow — protege contra burn-in e enriquece o visual.
        ─────────────────────────────────────────────────────────── */
        .img-box {
            position: relative; background: var(--cinza-2);
            overflow: hidden; flex-shrink: 0;
        }
        .card:not(.featured) .img-box { height: 170px; }
        .card.featured .img-box { width: 38%; height: 100%; }

        .img-src {
            width: 100%; height: 100%;
            background-size: 115%;
            background-position: center;
        }
        .img-src.fallback {
            background-size: 55%;
            background-repeat: no-repeat;
            animation: none !important;
        }

        @keyframes kb-tl {
            0%  { transform: scale(1.12) translate(-3%,-3%); }
            50% { transform: scale(1.00) translate( 2%, 2%); }
            100%{ transform: scale(1.12) translate(-3%,-3%); }
        }
        @keyframes kb-tr {
            0%  { transform: scale(1.10) translate( 3%,-3%); }
            50% { transform: scale(1.00) translate(-2%, 2%); }
            100%{ transform: scale(1.10) translate( 3%,-3%); }
        }
        @keyframes kb-br {
            0%  { transform: scale(1.12) translate( 3%, 3%); }
            50% { transform: scale(1.00) translate(-2%,-2%); }
            100%{ transform: scale(1.12) translate( 3%, 3%); }
        }
        @keyframes kb-bl {
            0%  { transform: scale(1.10) translate(-3%, 3%); }
            50% { transform: scale(1.00) translate( 2%,-2%); }
            100%{ transform: scale(1.10) translate(-3%, 3%); }
        }

        .kb-0 { animation: kb-tl 30s ease-in-out infinite; }
        .kb-1 { animation: kb-tr 34s ease-in-out infinite; }
        .kb-2 { animation: kb-br 28s ease-in-out infinite; }
        .kb-3 { animation: kb-bl 32s ease-in-out infinite; }

        /* ── BADGE ─────────────────────────────────────────────── */
        .badge {
            position: absolute; bottom:10px; left:10px;
            background: var(--verde); color: var(--branco);
            font-size: .65rem; font-weight: 700;
            padding: 4px 10px; border-radius: 999px;
            text-transform: uppercase; letter-spacing: 1px; z-index: 2;
        }

        /* ── INFO ──────────────────────────────────────────────── */
        .info {
            padding: 18px 20px;
            display: flex; flex-direction: column;
            justify-content: center; gap: 10px;
            flex: 1; overflow: hidden;
        }
        .card-meta time {
            font-size: .72rem; font-weight: 700;
            color: var(--txt-sec); text-transform: uppercase; letter-spacing: 1px;
        }
        .title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem; font-weight: 700;
            line-height: 1.3; color: var(--preto);
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .card.featured .title { font-size: 1.35rem; -webkit-line-clamp: 4; }
        .card-link-hint {
            font-size: .72rem; font-weight: 700; color: var(--verde);
            text-transform: uppercase; letter-spacing: 1px;
            opacity: 0; transform: translateX(-4px);
            transition: opacity .25s, transform .25s;
        }
        .card:hover .card-link-hint { opacity:1; transform:translateX(0); }

        /* ── TOAST ─────────────────────────────────────────────── */
        #toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--verde); color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem; font-weight: 700;
            padding: 10px 24px; border-radius: 999px;
            box-shadow: 0 6px 24px rgba(0,150,57,.3);
            opacity: 0; transition: opacity .4s, transform .4s;
            pointer-events: none; z-index: 500;
        }
        #toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

        /* ── FOOTER ────────────────────────────────────────────── */
        footer {
            position: fixed; bottom:0; left:0; right:0;
            background: rgba(255,255,255,.88);
            backdrop-filter: blur(14px);
            border-top: 2px solid var(--cinza-2);
            padding: 12px 24px;
            display: flex; justify-content: center; align-items: center; gap: 20px;
            z-index: 300;
        }
        .btn-pdf {
            background: var(--preto); color: var(--branco); border: none;
            padding: 10px 26px; border-radius: 999px; cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: .85rem; font-weight: 700; letter-spacing: .5px;
            transition: background var(--dur), transform .15s, box-shadow var(--dur);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-pdf:hover { background: var(--vermelho); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(200,16,46,.25); }
        .footer-info { font-size: .75rem; color: var(--cinza-3); font-weight: 500; }
        .footer-info strong { color: var(--txt-sec); }

        /* ── RESPONSIVE ────────────────────────────────────────── */
        @media (max-width: 900px) {
            header { grid-template-columns: 1fr auto; gap:12px; padding:0 16px; }
            .header-brand { display:none; }
            .logo-if { height:48px; }
            #clock { font-size:1.6rem; }
            .card.featured { flex-direction:column; max-height:none; grid-column:auto; }
            .card.featured .img-box { width:100%; height:180px; }
            #news-container { grid-template-columns:1fr; }
        }
        @media (min-width:1400px) { #news-container { grid-template-columns: repeat(3,1fr); } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
    <img src="https://github.com/yuriluna85/radar-ifbaiano/blob/main/marca-if-baiano-vertical.png?raw=true"
         alt="Logo IF Baiano" class="logo-if" onerror="this.style.display='none'">
    <div class="header-brand">
        <h1><span>DICOM</span>Radar de Notícias</h1>
    </div>
    <div class="header-clock">
        <div id="date-top">—</div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<div class="top-bar"><div id="bar-fill" style="width:100%"></div></div>
<div id="status-console">Painel DICOM v49.0 — Iniciando…</div>

<div class="main-content">
    <div class="filters-wrap">
        <span class="filters-label">Filtrar</span>
        <div id="filters"></div>
    </div>
    <div id="skeleton" class="skeleton-grid">
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
    <div id="news-container" style="display:none"></div>
</div>

<div id="toast"></div>

<footer>
    <button class="btn-pdf" onclick="gerarRelatorioPDF()">
        📄 Exportar PDF — <span id="pdf-context">Geral</span>
    </button>
    <span class="footer-info">Busca a cada <strong>1h</strong> · Verifica a cada <strong>5min</strong></span>
</footer>

<script>
/* ════════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════════ */
const CONFIG = {
    LOGO_URL:          "https://github.com/yuriluna85/radar-ifbaiano/blob/main/marca-if-baiano-vertical.png?raw=true",
    FETCH_INTERVAL_MS: 60 * 60 * 1000,  // 1h — busca nos servidores
    CHECK_INTERVAL_MS:  5 * 60 * 1000,  // 5min — re-renderiza se cache mudou
    POSTS_PER_UNIT:    5,
    CACHE_KEY:         "radar_ifbaiano_v2",
    CACHE_TTL_MS:      55 * 60 * 1000,  // 55min
};

const UNIDADES = [
    { id:"Reitoria",    url:"https://www.ifbaiano.edu.br/portal/wp-json/wp/v2/posts/" },
    { id:"Alagoinhas",  url:"https://www.ifbaiano.edu.br/unidades/alagoinhas/wp-json/wp/v2/posts/" },
    { id:"Lapa",        url:"https://www.ifbaiano.edu.br/unidades/lapa/wp-json/wp/v2/posts/" },
    { id:"Catu",        url:"https://www.ifbaiano.edu.br/unidades/catu/wp-json/wp/v2/posts/" },
    { id:"Mangabeira",  url:"https://www.ifbaiano.edu.br/unidades/gmb/wp-json/wp/v2/posts/" },
    { id:"Guanambi",    url:"https://www.ifbaiano.edu.br/unidades/guanambi/wp-json/wp/v2/posts/" },
    { id:"Itaberaba",   url:"https://www.ifbaiano.edu.br/unidades/itaberaba/wp-json/wp/v2/posts/" },
    { id:"Itapetinga",  url:"https://www.ifbaiano.edu.br/unidades/itapetinga/wp-json/wp/v2/posts/" },
    { id:"Santa Inês",  url:"https://www.ifbaiano.edu.br/unidades/santaines/wp-json/wp/v2/posts/" },
    { id:"Bonfim",      url:"https://www.ifbaiano.edu.br/unidades/bonfim/wp-json/wp/v2/posts/" },
    { id:"Serrinha",    url:"https://www.ifbaiano.edu.br/unidades/serrinha/wp-json/wp/v2/posts/" },
    { id:"Teixeira",    url:"https://www.ifbaiano.edu.br/unidades/teixeira/wp-json/wp/v2/posts/" },
    { id:"Uruçuca",     url:"https://www.ifbaiano.edu.br/unidades/urucuca/wp-json/wp/v2/posts/" },
    { id:"Valença",     url:"https://www.ifbaiano.edu.br/unidades/valenca/wp-json/wp/v2/posts/" },
    { id:"Xique-Xique", url:"https://www.ifbaiano.edu.br/unidades/xique-xique/wp-json/wp/v2/posts/" },
];

/* ════════════════════════════════════════════════════════════
   ESTADO
════════════════════════════════════════════════════════════ */
let dataStore     = [];
let currentFilter = "Todos";
let fetchCountdown = CONFIG.FETCH_INTERVAL_MS / 1000;
let barTimer      = null;

/* ════════════════════════════════════════════════════════════
   DOM
════════════════════════════════════════════════════════════ */
const $         = id => document.getElementById(id);
const elClock   = $("clock"),  elDate   = $("date-top");
const elConsole = $("status-console"), elBarFill = $("bar-fill");
const elFilters = $("filters"), elNews  = $("news-container");
const elSkeleton= $("skeleton"), elPdfCtx= $("pdf-context");
const elToast   = $("toast");

/* ════════════════════════════════════════════════════════════
   ANTI-BURN-IN: bolhas de gradiente em movimento lento
════════════════════════════════════════════════════════════ */
(function initBg() {
    const canvas = $("bg-canvas");
    const ctx    = canvas.getContext("2d");

    // Paleta: tons de verde muito suave
    const PALETA = [
        [0,  150, 57,  .04],
        [0,  100, 40,  .03],
        [180,220,180,  .05],
        [240,245,240,  .06],
        [220,240,220,  .05],
        [0,  180, 70,  .03],
        [200,230,200,  .04],
    ];

    let blobs = PALETA.map(([r,g,b,a]) => ({
        x:  Math.random() * window.innerWidth,
        y:  Math.random() * window.innerHeight,
        r:  260 + Math.random() * 280,
        vx: (Math.random() - .5) * .22,
        vy: (Math.random() - .5) * .22,
        cr:r, cg:g, cb:b, ca:a,
    }));

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);

    function frame() {
        const W = canvas.width, H = canvas.height;
        ctx.fillStyle = "#eef0ee";
        ctx.fillRect(0, 0, W, H);

        blobs.forEach(b => {
            const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
            g.addColorStop(0, `rgba(${b.cr},${b.cg},${b.cb},${b.ca})`);
            g.addColorStop(1, `rgba(${b.cr},${b.cg},${b.cb},0)`);
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
            ctx.fillStyle = g;
            ctx.fill();
            b.x += b.vx; b.y += b.vy;
            if (b.x < -b.r) b.x = W+b.r;
            if (b.x > W+b.r) b.x = -b.r;
            if (b.y < -b.r) b.y = H+b.r;
            if (b.y > H+b.r) b.y = -b.r;
        });
        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
})();

/* ════════════════════════════════════════════════════════════
   RELÓGIO
════════════════════════════════════════════════════════════ */
function updateClock() {
    const now = new Date();
    elClock.textContent = now.toLocaleTimeString("pt-BR");
    elDate.textContent  = now.toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
}
setInterval(updateClock, 1000); updateClock();

/* ════════════════════════════════════════════════════════════
   BARRA DE PROGRESSO (contagem até próximo fetch 1h)
════════════════════════════════════════════════════════════ */
function startProgressBar() {
    fetchCountdown = CONFIG.FETCH_INTERVAL_MS / 1000;
    clearInterval(barTimer);
    barTimer = setInterval(() => {
        fetchCountdown--;
        elBarFill.style.width = (fetchCountdown / (CONFIG.FETCH_INTERVAL_MS/1000) * 100) + "%";
        if (fetchCountdown <= 0) { clearInterval(barTimer); giroCompleto(); }
    }, 1000);
}

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
function showToast(msg) {
    elToast.textContent = msg;
    elToast.classList.add("show");
    setTimeout(() => elToast.classList.remove("show"), 5000);
}

/* ════════════════════════════════════════════════════════════
   FILTROS
════════════════════════════════════════════════════════════ */
function buildFilters() {
    const make = (label, active=false) => {
        const b = document.createElement("button");
        b.className = "btn-filter" + (active?" active":"");
        b.textContent = label;
        b.onclick = () => applyFilter(label, b);
        return b;
    };
    elFilters.appendChild(make("Todos", true));
    UNIDADES.forEach(u => elFilters.appendChild(make(u.id)));
}
function applyFilter(id, btn) {
    currentFilter = id;
    document.querySelectorAll(".btn-filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    elPdfCtx.textContent = id==="Todos" ? "Geral" : id;
    render(dataStore);
}

/* ════════════════════════════════════════════════════════════
   CACHE (sessionStorage)
════════════════════════════════════════════════════════════ */
function saveCache(data) {
    try { sessionStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ts:Date.now(), data})); } catch(_) {}
}
function loadCache() {
    try {
        const raw = sessionStorage.getItem(CONFIG.CACHE_KEY);
        if (!raw) return null;
        const {ts, data} = JSON.parse(raw);
        if (Date.now()-ts < CONFIG.CACHE_TTL_MS) return data;
    } catch(_) {}
    return null;
}

/* ════════════════════════════════════════════════════════════
   PARSER DE POST
════════════════════════════════════════════════════════════ */
const ENTITIES = {"&#8211;":"–","&#8220;":"\u201C","&#8221;":"\u201D","&nbsp;":" ","&amp;":"&"};
const decodeTitle = t => t.replace(/&#\d+;|&\w+;/g, m => ENTITIES[m] ?? m);

function parsePost(post, campusId) {
    let img = CONFIG.LOGO_URL, imgStatus = "fallback";
    if (post._embedded?.["wp:featuredmedia"]?.[0]?.source_url) {
        img = post._embedded["wp:featuredmedia"][0].source_url; imgStatus = "featured";
    } else {
        const m = post.content?.rendered?.match(/src="([^"]+)"/);
        if (m) { img = m[1]; imgStatus = "inline"; }
    }
    return { title:decodeTitle(post.title.rendered), link:post.link,
             date:new Date(post.date), campus:campusId,
             img, imgStatus, isFallback: imgStatus==="fallback" };
}

/* ════════════════════════════════════════════════════════════
   FETCH PARALELO (busca em todas as unidades ao mesmo tempo)
════════════════════════════════════════════════════════════ */
async function fetchUnit(u) {
    try {
        const res = await fetch(`${u.url}?per_page=${CONFIG.POSTS_PER_UNIT}&_embed&_t=${Date.now()}`);
        if (!res.ok) throw new Error();
        const posts = await res.json();
        return Array.isArray(posts) ? posts.map(p => parsePost(p, u.id)) : [];
    } catch(_) {
        return dataStore.filter(n => n.campus === u.id); // fallback para dados anteriores
    }
}

async function giroCompleto() {
    elConsole.textContent = "Buscando notícias em todas as unidades (paralelo)…";
    const prevLinks = new Set(dataStore.map(n => n.link));

    const results = await Promise.allSettled(UNIDADES.map(fetchUnit));
    const batch   = results.flatMap(r => r.status==="fulfilled" ? r.value : []);

    if (batch.length) {
        const novas = batch.filter(n => !prevLinks.has(n.link)).length;
        dataStore = batch;
        saveCache(batch);
        if (novas > 0 && prevLinks.size > 0)
            showToast(`✓ ${novas} nova${novas>1?"s":""} notícia${novas>1?"s":""} encontrada${novas>1?"s":""}`);
    }

    render(dataStore);
    hideSkeleton();
    const agora = new Date().toLocaleTimeString("pt-BR");
    const prox  = new Date(Date.now()+CONFIG.FETCH_INTERVAL_MS).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    elConsole.textContent = `Online ● Sincronizado às ${agora} · ${dataStore.length} notícias · Próxima busca: ${prox}`;
    startProgressBar();
}

/* ════════════════════════════════════════════════════════════
   CHECK PERIÓDICO A CADA 5MIN
   Re-renderiza se os dados em cache mudaram (ex: outra aba
   ou outro cliente já buscou antes).
════════════════════════════════════════════════════════════ */
setInterval(() => {
    const cached = loadCache();
    if (!cached) return;
    const rehy = cached.map(n => ({...n, date:new Date(n.date)}));
    if (rehy[0]?.link !== dataStore[0]?.link) {
        dataStore = rehy;
        render(dataStore);
        elConsole.textContent = `Exibição atualizada às ${new Date().toLocaleTimeString("pt-BR")}`;
    }
}, CONFIG.CHECK_INTERVAL_MS);

/* ════════════════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════════════════ */
const KB = ["kb-0","kb-1","kb-2","kb-3"];

function buildDisplayList(list) {
    if (currentFilter === "Todos") {
        const map = new Map();
        list.forEach(n => { if (!map.has(n.campus)||n.date>map.get(n.campus).date) map.set(n.campus,n); });
        const arr = Array.from(map.values()).sort((a,b)=>b.date-a.date);
        const ri = arr.findIndex(n=>n.campus==="Reitoria");
        if (ri>0) arr.unshift(arr.splice(ri,1)[0]);
        return arr;
    }
    return list.filter(n=>n.campus===currentFilter).sort((a,b)=>b.date-a.date).slice(0,8);
}

function fmtDate(d) {
    return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"})
         + " · "
         + d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function cardHTML(n, i) {
    const featured = i===0 ? " featured" : "";
    const kb       = n.isFallback ? "" : " "+KB[i%4];
    return `
    <a href="${n.link}" target="_blank" rel="noopener" class="card${featured}">
        <div class="img-box">
            <div class="img-src${n.isFallback?" fallback":""}${kb}"
                 style="background-image:url('${n.img}')"></div>
            <div class="badge">${n.campus}</div>
        </div>
        <div class="info">
            <div class="card-meta"><time>${fmtDate(n.date)}</time></div>
            <h2 class="title">${n.title}</h2>
            <div class="card-link-hint">↗ Ler notícia</div>
        </div>
    </a>`;
}

function render(list) {
    const display = buildDisplayList(list);
    elNews.innerHTML = display.length
        ? display.map(cardHTML).join("")
        : `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#aaa"><p>Nenhuma notícia para <strong>${currentFilter}</strong></p></div>`;
    elNews.style.display = "grid";
}

function hideSkeleton() {
    if (elSkeleton) elSkeleton.style.display = "none";
}

/* ════════════════════════════════════════════════════════════
   PDF
════════════════════════════════════════════════════════════ */
function getBase64FromUrl(url) {
    return new Promise((res,rej) => {
        const img = new Image(); img.crossOrigin = "anonymous";
        img.onload = () => {
            const c = document.createElement("canvas");
            c.width=img.width; c.height=img.height;
            c.getContext("2d").drawImage(img,0,0);
            res(c.toDataURL("image/png"));
        };
        img.onerror = rej; img.src = url;
    });
}

async function gerarRelatorioPDF() {
    if (!window.jspdf?.jsPDF) { alert("Biblioteca PDF carregando…"); return; }
    if (!dataStore.length)    { alert("Aguarde a sincronização."); return; }
    elConsole.textContent = "Gerando relatório…";
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF("p","mm","a4");
    const now = new Date();
    const label = currentFilter==="Todos" ? "Geral" : currentFilter;
    const rows = (currentFilter==="Todos" ? [...dataStore] : dataStore.filter(n=>n.campus===currentFilter))
        .sort((a,b)=>b.date-a.date)
        .map(n=>[
            n.date.toLocaleDateString("pt-BR")+"\n"+n.date.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
            n.campus, n.title+"\n\n"+n.link, n.imgStatus
        ]);
    try { doc.addImage(await getBase64FromUrl(CONFIG.LOGO_URL),"PNG",10,8,28,38); } catch(_) {}
    doc.setFont("helvetica","bold"); doc.setFontSize(15);
    doc.text(`Relatório de Monitoramento — ${label}`,44,22);
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(80);
    doc.text(`DICOM · ${now.toLocaleDateString("pt-BR")} às ${now.toLocaleTimeString("pt-BR")}`,44,30);
    doc.setTextColor(0); doc.setDrawColor(0,150,57); doc.setLineWidth(.6); doc.line(10,52,200,52);
    doc.autoTable({
        startY:58, head:[["Data/Hora","Campus","Título e URL","Imagem"]], body:rows,
        headStyles:{fillColor:[0,150,57],fontSize:8},
        bodyStyles:{fontSize:7.5,cellPadding:3},
        columnStyles:{0:{cellWidth:24},1:{cellWidth:26},2:{cellWidth:110},3:{cellWidth:26}},
        alternateRowStyles:{fillColor:[245,255,248]},
        margin:{left:10,right:10},
    });
    doc.save(`Relatorio_${label.replace(/\s/g,"_")}_${now.toLocaleDateString("pt-BR").replace(/\//g,"-")}.pdf`);
    elConsole.textContent = "✓ Relatório gerado com sucesso.";
}

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
function init() {
    buildFilters();
    const cached = loadCache();
    if (cached?.length) {
        dataStore = cached.map(n => ({...n, date:new Date(n.date)}));
        render(dataStore);
        hideSkeleton();
        elConsole.textContent = "Cache restaurado. Sincronizando em segundo plano…";
    }
    giroCompleto();
}

init();
</script>
